version: '3.9'

services:
  api-gateway:
    build:
      context: ../../apps/api-gateway
      dockerfile: Dockerfile
    container_name: octo-crm-api-gateway
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      AUTH_SERVICE_URL:         http://auth-service:4001
      USER_SERVICE_URL:         http://user-service:4002
      CRM_SERVICE_URL:          http://crm-service:4003
      BILLING_SERVICE_URL:      http://billing-service:4004
      NOTIFICATION_SERVICE_URL: http://notification-service:4005
    depends_on:
      - auth-service
      - user-service
      - crm-service

  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    container_name: octo-crm-auth-service
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://octocrm:secret@postgres:5432/octocrm
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: ../../services/user-service
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://octocrm:secret@postgres:5432/octocrm
    depends_on:
      postgres:
        condition: service_healthy

  crm-service:
    build:
      context: ../../services/crm-service
      dockerfile: Dockerfile
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://octocrm:secret@postgres:5432/octocrm
    depends_on:
      postgres:
        condition: service_healthy

  billing-service:
    build:
      context: ../../services/billing-service
      dockerfile: Dockerfile
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://octocrm:secret@postgres:5432/octocrm

  notification-service:
    build:
      context: ../../services/notification-service
      dockerfile: Dockerfile
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: production
      REDIS_HOST: redis

  analytics-service:
    build:
      context: ../../services/analytics-service
      dockerfile: Dockerfile
    ports:
      - "4006:4006"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://octocrm:secret@postgres:5432/octocrm

  file-service:
    build:
      context: ../../services/file-service
      dockerfile: Dockerfile
    ports:
      - "4007:4007"
    environment:
      NODE_ENV: production
      S3_BUCKET: ${S3_BUCKET}

  audit-service:
    build:
      context: ../../services/audit-service
      dockerfile: Dockerfile
    ports:
      - "4008:4008"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://octocrm:secret@postgres:5432/octocrm
