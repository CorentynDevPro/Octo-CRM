global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:4000']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:4001']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:4002']

  - job_name: 'crm-service'
    static_configs:
      - targets: ['crm-service:4003']

  - job_name: 'billing-service'
    static_configs:
      - targets: ['billing-service:4004']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:4005']
